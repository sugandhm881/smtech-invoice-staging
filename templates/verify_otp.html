<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahayak ERP - Two-Step Verification</title>
    <link rel="icon" href="/static/sayahak_logo_2.5.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .otp-input { letter-spacing: 0.75em; }
        .otp-input::placeholder { letter-spacing: normal; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen font-sans">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl overflow-hidden transform transition-all">
        
        <div class="bg-gradient-to-r from-orange-500 to-red-600 h-2"></div>

        <div class="p-10 text-center">
            <div class="mx-auto w-20 h-20 bg-orange-50 rounded-full flex items-center justify-center mb-6 border border-orange-100">
                <svg class="w-10 h-10 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>

            <h2 class="text-3xl font-extrabold text-gray-800 mb-2">Security Check</h2>
            <p class="text-gray-500 text-sm mb-8 leading-relaxed">
                To protect your account, please enter the <strong>6-digit OTP</strong> sent to the Administrator's registered email address.
            </p>

            {% if error %}
                <div class="bg-red-50 border-l-4 border-red-500 text-red-700 p-4 rounded text-sm mb-6 text-left shadow-sm flex items-start" role="alert">
                    <svg class="w-5 h-5 mr-2 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path></svg>
                    <div>
                        <p class="font-bold">Authentication Failed</p>
                        <p>{{ error }}</p>
                    </div>
                </div>
            {% endif %}

            <form method="POST" action="/verify-otp" class="space-y-8">
                <div class="relative">
                    <input type="text" name="otp" 
                           placeholder="000000" 
                           required maxlength="6"
                           autocomplete="off"
                           class="otp-input w-full px-4 py-4 border-2 border-gray-200 rounded-xl text-center text-3xl font-bold text-gray-800 focus:outline-none focus:border-orange-500 focus:ring-4 focus:ring-orange-100 transition-all placeholder-gray-300 shadow-inner">
                </div>

                <button type="submit" class="w-full py-4 px-6 rounded-full shadow-lg bg-gradient-to-r from-orange-500 to-red-600 text-white font-bold text-lg hover:from-orange-600 hover:to-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-orange-500 transform transition hover:-translate-y-1">
                    Verify & Login
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-gray-100">
                <a href="/login" class="text-gray-400 hover:text-gray-600 transition flex items-center justify-center text-sm font-medium">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Back to Login Screen
                </a>
            </div>
        </div>
    </div>

</body>
</html>
